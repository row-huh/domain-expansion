<!DOCTYPE html>
<html>
<head>
  <title>Hand Gesture Detector</title>
  <script type="importmap">
    { "imports": {
        "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/+esm"
    } }
  </script>
</head>
<body>
  <input type="file" id="upload" accept="image/*" />
  <div id="result" style="font-size:2em;font-weight:bold;color:green;display:none">MATCHED</div>
  <div style="position:relative;display:inline-block;width:480px;height:360px;overflow:hidden;border:1px solid #ccc">
    <img id="img" style="display:none;width:100%;height:100%;object-fit:contain" />
    <canvas id="overlay" style="position:absolute;top:0;left:0;pointer-events:none"></canvas>
  </div>

  <script type="module">
    import { HandLandmarker, FilesetResolver, DrawingUtils } from "@mediapipe/tasks-vision";

    const upload = document.getElementById("upload");
    const img = document.getElementById("img");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");
    const result = document.getElementById("result");

    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
    );
    const handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "CPU"
      },
      runningMode: "IMAGE",
      numHands: 2
    });

    const drawingUtils = new DrawingUtils(ctx);

    // Landmark indices:
    // INDEX:  MCP=5, PIP=6, DIP=7,  TIP=8
    // MIDDLE: MCP=9, PIP=10, DIP=11, TIP=12
    // RING:   MCP=13, PIP=14, DIP=15, TIP=16
    // PINKY:  MCP=17, PIP=18, DIP=19, TIP=20

    function sub(a, b) { return { x: a.x - b.x, y: a.y - b.y }; }
    function dot(a, b) { return a.x * b.x + a.y * b.y; }
    function len(v) { return Math.sqrt(v.x * v.x + v.y * v.y); }
    function angle(a, vertex, b) {
      const va = sub(a, vertex), vb = sub(b, vertex);
      return Math.acos(Math.max(-1, Math.min(1, dot(va, vb) / (len(va) * len(vb) + 1e-9)))) * 180 / Math.PI;
    }

    function checkGesture(lm) {
      // Crossed: index tip (8) and middle tip (12) have swapped lateral positions vs their MCPs
      const naturalDir = lm[5].x - lm[9].x;
      const tipDir = lm[8].x - lm[12].x;
      const crossed = (naturalDir * tipDir < 0) || (Math.abs(tipDir) < 0.05);

      // Middle finger (12-11-10) stretched straight
      const middleStretched = angle(lm[12], lm[11], lm[10]) > 140 &&
                              angle(lm[11], lm[10], lm[9]) > 140;

      // Ring and pinky bent
      const ringBent  = angle(lm[16], lm[15], lm[14]) < 120 ||
                        (lm[16].y > lm[13].y - 0.02 && Math.abs(lm[16].y - lm[13].y) < 0.08);
      const pinkyBent = angle(lm[20], lm[19], lm[18]) < 120 ||
                        (lm[20].y > lm[17].y - 0.02 && Math.abs(lm[20].y - lm[17].y) < 0.08);

      return crossed && middleStretched && (ringBent || pinkyBent);
    }

    upload.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      result.style.display = "none";
      img.src = URL.createObjectURL(file);
      img.style.display = "block";

      img.onload = () => {
        // Compute rendered size accounting for object-fit:contain inside the 480x360 box
        const boxW = img.parentElement.offsetWidth;
        const boxH = img.parentElement.offsetHeight;
        const scale = Math.min(boxW / img.naturalWidth, boxH / img.naturalHeight);
        const renderedW = img.naturalWidth * scale;
        const renderedH = img.naturalHeight * scale;
        const offX = (boxW - renderedW) / 2;
        const offY = (boxH - renderedH) / 2;

        canvas.width = boxW;
        canvas.height = boxH;
        canvas.style.width = boxW + "px";
        canvas.style.height = boxH + "px";
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const detection = handLandmarker.detect(img);
        if (!detection.landmarks?.length) return;

        // Remap normalized coords to rendered image position inside the box
        const remapped = detection.landmarks.map(lm =>
          lm.map(p => ({ ...p, x: (p.x * renderedW + offX) / boxW, y: (p.y * renderedH + offY) / boxH }))
        );

        let matched = false;
        for (let i = 0; i < remapped.length; i++) {
          drawingUtils.drawConnectors(remapped[i], HandLandmarker.HAND_CONNECTIONS, { color: "#00FF00", lineWidth: 5 });
          drawingUtils.drawLandmarks(remapped[i], { color: "#FF0000", lineWidth: 1 });
          if (checkGesture(detection.landmarks[i])) matched = true;
        }
        if (matched) result.style.display = "block";
      };
    });
  </script>
</body>
</html>
