<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Gesture Detector</title>
</head>
<body>
<h2>Gesture Detector</h2>
<div id="status">Loading MediaPipe...</div>
<br/>
<input type="file" id="upload" accept="image/*" disabled />
<div id="result" style="font-size:2em;font-weight:bold;margin:12px 0;min-height:2.5rem"></div>
<canvas id="canvas"></canvas>

<script type="module">
import {
  HandLandmarker,
  FilesetResolver,
  DrawingUtils
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const uploadEl = document.getElementById("upload");
const canvas   = document.getElementById("canvas");
const ctx      = canvas.getContext("2d");

function dist(a, b) {
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2 + (a.z-b.z)**2);
}
function sub(a, b) { return { x: a.x-b.x, y: a.y-b.y }; }
function dot(a, b) { return a.x*b.x + a.y*b.y; }
function len(v)    { return Math.sqrt(v.x*v.x + v.y*v.y); }
function angle(a, vertex, b) {
  const va = sub(a, vertex), vb = sub(b, vertex);
  return Math.acos(Math.max(-1, Math.min(1, dot(va,vb) / (len(va)*len(vb)+1e-9)))) * 180/Math.PI;
}

// Gesture 1: Sukuna Domain Expansion (2 hands)
function checkSukuna(landmarks) {
  if (landmarks.length < 2) return false;
  const [h1, h2] = landmarks;
  let L, R;
  if (h1[0].x < h2[0].x) { L = h2; R = h1; } else { L = h1; R = h2; }
  let passed = 0;
  if (dist(L[12], R[12]) < 0.10) passed++;
  if (dist(L[16], R[16]) < 0.10) passed++;
  if (dist(L[4],  R[4])  < 0.10) passed++;
  if (L[8].y > L[6].y && R[8].y > R[6].y)    passed++;
  if (L[20].y > L[18].y && R[20].y > R[18].y) passed++;
  return passed >= 2;
}

// Gesture 2: Crossed Fingers (single hand)
function checkCrossed(lm) {
  const naturalDir = lm[5].x - lm[9].x;
  const tipDir     = lm[8].x - lm[12].x;
  const crossed    = (naturalDir * tipDir < 0) || (Math.abs(tipDir) < 0.05);
  const middleStretched = angle(lm[12],lm[11],lm[10]) > 140 &&
                          angle(lm[11],lm[10],lm[9])  > 140;
  return crossed && middleStretched;
}

async function init() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
  );
  const handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "CPU"
    },
    numHands: 2,
    runningMode: "IMAGE"
  });

  statusEl.textContent = "Ready. Upload an image.";
  uploadEl.disabled = false;

  uploadEl.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    resultEl.textContent = "";
    resultEl.style.color = "green";

    const img = new Image();
    img.onload = () => {
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);

      const { landmarks } = handLandmarker.detect(canvas);
      statusEl.textContent = `Detected ${landmarks.length} hand(s).`;

      const drawUtils = new DrawingUtils(ctx);
      for (const lm of landmarks) {
        drawUtils.drawConnectors(lm, HandLandmarker.HAND_CONNECTIONS, { color: "#00ff88", lineWidth: 2 });
        drawUtils.drawLandmarks(lm, { color: "#ff0055", lineWidth: 1, radius: 3 });
      }

      // Only one result shown — Sukuna (2 hands) takes priority
      if (landmarks.length >= 2 && checkSukuna(landmarks)) {
        resultEl.textContent = "⛩️ MATCHED — Malevolent Shrine summoned by Sukuna & his Unpaid Intern USANNE (who uses email as version control - insane skill issue)";
        resultEl.style.color = "red";
      } else if (landmarks.length === 1 && checkCrossed(landmarks[0])) {
        resultEl.textContent = "MATCHED — Unlimited Void";
        resultEl.style.color = "blue";
      }
    };
    img.src = URL.createObjectURL(file);
  });
}

init().catch(err => {
  statusEl.textContent = "Error: " + err.message;
  console.error(err);
});
</script>
</body>
</html>
