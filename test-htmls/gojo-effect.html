<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Warp Effect Test</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:black;
}

canvas{
  position:fixed;
  inset:0;
}

#flash{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
}

#sphere{
  position:fixed;
  inset:0;
  background:black;
  clip-path:circle(0% at 50% 50%);
}

@keyframes flashAnim{
  0%{opacity:0}
  20%{opacity:1}
  100%{opacity:0}
}

@keyframes sphereExpand{
  0%{clip-path:circle(0% at 50% 50%)}
  100%{clip-path:circle(150% at 50% 50%)}
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="sphere"></div>
<div id="flash"></div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = innerWidth
canvas.height = innerHeight

const cx = canvas.width/2
const cy = canvas.height/2

/* ------------------ INK STAINS ------------------ */

let stains=[]

for(let i=0;i<10;i++){
  stains.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:300 + Math.random()*500
  })
}

function drawInkBackground(){

  ctx.fillStyle="black"
  ctx.fillRect(0,0,canvas.width,canvas.height)

  for(let s of stains){

    const g = ctx.createRadialGradient(
      s.x,s.y,0,
      s.x,s.y,s.r
    )

    g.addColorStop(0,"rgba(255,255,255,0.12)")
    g.addColorStop(0.4,"rgba(255,255,255,0.06)")
    g.addColorStop(1,"rgba(255,255,255,0)")

    ctx.fillStyle=g
    ctx.beginPath()
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
    ctx.fill()

  }

}

/* ------------------ WARP STARS ------------------ */

const COLORS=[
  "white",
  "#9333ea",
  "#7c3aed",
  "#ef4444"
]

let stars=[]
const STAR_COUNT=2500

for(let i=0;i<STAR_COUNT;i++){
  stars.push({
    x:(Math.random()-0.5)*canvas.width,
    y:(Math.random()-0.5)*canvas.height,
    z:Math.random()*canvas.width,
    color:COLORS[Math.floor(Math.random()*COLORS.length)]
  })
}

let warpActive=false
let speed=0

function drawWarp(){

  if(!warpActive) return

  for(let s of stars){

    const prevZ=s.z
    s.z -= speed

    if(s.z<=0){
      s.z = canvas.width
    }

    const x=(s.x/s.z)*canvas.width + cx
    const y=(s.y/s.z)*canvas.height + cy

    const px=(s.x/prevZ)*canvas.width + cx
    const py=(s.y/prevZ)*canvas.height + cy

    ctx.strokeStyle=s.color
    ctx.lineWidth=2

    ctx.beginPath()
    ctx.moveTo(px,py)
    ctx.lineTo(x,y)
    ctx.stroke()

  }

}

function frame(){

  drawInkBackground()
  drawWarp()

  requestAnimationFrame(frame)

}

frame()

/* ------------------ SEQUENCE ------------------ */

function trigger(){

  document.getElementById("flash").style.animation="flashAnim 120ms forwards"

  setTimeout(()=>{
    document.getElementById("sphere").style.animation="sphereExpand 800ms ease-out forwards"
  },120)

  setTimeout(()=>{
    warpActive=true
    speed=30
  },900)

}

document.addEventListener("keydown",trigger)

</script>

</body>
</html>
