<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sukuna Domain Expansion Detector</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
  #result { font-size: 2rem; font-weight: bold; margin: 16px 0; min-height: 2.5rem; }
  #result.matched { color: #ff4444; }
  canvas { display: block; margin-top: 16px; border: 1px solid #444; }
  input[type=file] { margin-bottom: 12px; }
  #status { color: #888; font-size: 0.85rem; }
</style>
</head>
<body>
<h2>Sukuna Domain Expansion — Gesture Detector</h2>
<div id="status">Loading MediaPipe...</div>
<br/>
<input type="file" id="upload" accept="image/*" disabled />
<div id="result"></div>
<canvas id="canvas"></canvas>

<script type="module">
import {
  HandLandmarker,
  FilesetResolver,
  DrawingUtils
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const uploadEl = document.getElementById("upload");
const canvas   = document.getElementById("canvas");
const ctx      = canvas.getContext("2d");

const TOUCH_THRESHOLD = 0.10; // normalized distance

function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2 + (a.z - b.z) ** 2);
}

function checkGesture(landmarks) {
  if (landmarks.length < 2) return false;

  // Identify left/right hands by wrist x position
  // Lower x = more to the right in image = right hand (mirrored)
  const [h1, h2] = landmarks;
  let L, R;
  if (h1[0].x < h2[0].x) { L = h2; R = h1; }
  else                     { L = h1; R = h2; }

  let passed = 0;

  // Rule 1: Middle fingertips touch (12)
  if (dist(L[12], R[12]) < TOUCH_THRESHOLD) passed++;

  // Rule 2: Ring fingertips touch (16)
  if (dist(L[16], R[16]) < TOUCH_THRESHOLD) passed++;

  // Rule 3: Thumb tips touch (4)
  if (dist(L[4], R[4]) < TOUCH_THRESHOLD) passed++;

  // Rule 4: Index fingers bent — tip(8).y > pip(6).y
  if (L[8].y > L[6].y && R[8].y > R[6].y) passed++;

  // Rule 5: Pinky fingers bent — tip(20).y > pip(18).y
  if (L[20].y > L[18].y && R[20].y > R[18].y) passed++;

  return passed >= 2;
}

async function init() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
  );

  const handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "CPU"
    },
    numHands: 2,
    runningMode: "IMAGE"
  });

  statusEl.textContent = "Ready. Upload an image.";
  uploadEl.disabled = false;

  uploadEl.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    img.onload = async () => {
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);

      const result = handLandmarker.detect(canvas);
      const { landmarks, worldLandmarks } = result;

      statusEl.textContent = `Detected ${landmarks.length} hand(s).`;

      // Draw landmarks overlay
      const drawUtils = new DrawingUtils(ctx);
      for (const lm of landmarks) {
        drawUtils.drawConnectors(lm, HandLandmarker.HAND_CONNECTIONS, { color: "#00ff88", lineWidth: 2 });
        drawUtils.drawLandmarks(lm, { color: "#ff0055", lineWidth: 1, radius: 3 });
      }

      if (landmarks.length >= 2 && checkGesture(landmarks)) {
        resultEl.textContent = "⛩️ MATCHED — Malevolent Shrine summoned by Sukuna & his Unpaid Intern USANNE";
        resultEl.className = "matched";
      } else {
        resultEl.textContent = "";
        resultEl.className = "";
      }
    };
    img.src = URL.createObjectURL(file);
  });
}

init().catch(err => {
  statusEl.textContent = "Error: " + err.message;
  console.error(err);
});
</script>
</body>
</html>
