<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sukuna Domain Expansion Detector</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; min-height: 100%; }
  body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
  #result { font-size: 2rem; font-weight: bold; margin: 16px 0; min-height: 2.5rem; }
  #result.matched { color: #ff4444; }
  canvas { display: block; margin-top: 16px; border: 1px solid #444; max-width: 100%; }
  input[type=file] { margin-bottom: 12px; }
  #status { color: #888; font-size: 0.85rem; }

  #domain-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    overflow: hidden;
    background: #000;
    cursor: pointer;
  }
  #domain-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
  }
  #shatter-canvas, #slash-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  #slash-canvas { pointer-events: none; }
  #domain-title {
    position: absolute;
    bottom: 10%;
    width: 100%;
    text-align: center;
    font-size: 3rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0;
    text-shadow: 0 0 40px #ff2200, 0 0 80px #ff0000;
    pointer-events: none;
  }
  #dismiss-hint {
    position: absolute;
    bottom: 2%;
    width: 100%;
    text-align: center;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.2em;
    pointer-events: none;
  }
</style>
</head>
<body>
<h2>Sukuna Domain Expansion — Gesture Detector</h2>
<div id="status">Loading MediaPipe...</div>
<br/>

<div style="background:#1a1a1a; border:1px solid #333; padding:12px; margin-bottom:12px; border-radius:4px;">
  <div style="font-size:0.8rem; color:#888; margin-bottom:8px;">ASSETS (pick once, then use gesture image upload below)</div>
  <label style="display:block; margin-bottom:6px; font-size:0.85rem;">
    🖼 Domain BG Image: <input type="file" id="bg-picker" accept="image/*" style="margin-left:8px;">
  </label>
  <label style="display:block; font-size:0.85rem;">
    🔊 Audio File: <input type="file" id="audio-picker" accept="audio/*" style="margin-left:8px;">
  </label>
  <div id="asset-status" style="margin-top:8px; font-size:0.75rem; color:#666;">No assets loaded yet.</div>
</div>

<div style="font-size:0.85rem; color:#aaa; margin-bottom:6px;">Gesture image to analyse:</div>
<input type="file" id="upload" accept="image/*" disabled />
<div id="result"></div>
<canvas id="canvas"></canvas>

<div id="domain-overlay">
  <div id="domain-bg"></div>
  <canvas id="shatter-canvas"></canvas>
  <canvas id="slash-canvas"></canvas>
  <div id="domain-title">Malevolent Shrine</div>
  <div id="dismiss-hint">CLICK TO DISMISS</div>
</div>

<!-- ── Set your audio file path here ── -->
<audio id="domain-audio" preload="auto"></audio>

<script type="module">
import {
  HandLandmarker,
  FilesetResolver,
  DrawingUtils
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const uploadEl = document.getElementById("upload");
const canvas   = document.getElementById("canvas");
const ctx      = canvas.getContext("2d");
const assetStatus = document.getElementById("asset-status");

// Asset state
let bgImageURL = null;
let audioURL   = null;

// BG image picker
document.getElementById("bg-picker").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (bgImageURL) URL.revokeObjectURL(bgImageURL);
  bgImageURL = URL.createObjectURL(file);
  document.getElementById("domain-bg").style.backgroundImage = `url('${bgImageURL}')`;
  updateAssetStatus();
});

// Audio picker
document.getElementById("audio-picker").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (audioURL) URL.revokeObjectURL(audioURL);
  audioURL = URL.createObjectURL(file);
  document.getElementById("domain-audio").src = audioURL;
  document.getElementById("domain-audio").load();
  updateAssetStatus();
});

function updateAssetStatus() {
  const imgOk   = bgImageURL ? "✅ Image loaded" : "❌ No image";
  const audioOk = audioURL   ? "✅ Audio loaded" : "❌ No audio";
  assetStatus.textContent = `${imgOk}  |  ${audioOk}`;
  assetStatus.style.color = (bgImageURL && audioURL) ? "#44ff88" : "#ffaa44";
}

const TOUCH_THRESHOLD = 0.10;

function dist(a, b) {
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2 + (a.z-b.z)**2);
}

function checkGesture(landmarks) {
  if (landmarks.length < 2) return false;
  const [h1, h2] = landmarks;
  let L, R;
  if (h1[0].x < h2[0].x) { L = h2; R = h1; } else { L = h1; R = h2; }
  let passed = 0;
  if (dist(L[12], R[12]) < TOUCH_THRESHOLD) passed++;
  if (dist(L[16], R[16]) < TOUCH_THRESHOLD) passed++;
  if (dist(L[4],  R[4])  < TOUCH_THRESHOLD) passed++;
  if (L[8].y > L[6].y && R[8].y > R[6].y)  passed++;
  if (L[20].y > L[18].y && R[20].y > R[18].y) passed++;
  return passed >= 2;
}

// ─────────────────────────────────────────────
// DOMAIN EXPANSION ORCHESTRATOR
// ─────────────────────────────────────────────
function triggerDomainExpansion() {
  const overlay     = document.getElementById("domain-overlay");
  const shatterCv   = document.getElementById("shatter-canvas");
  const slashCv     = document.getElementById("slash-canvas");
  const domainBg    = document.getElementById("domain-bg");
  const domainTitle = document.getElementById("domain-title");
  const audio       = document.getElementById("domain-audio");

  overlay.style.display = "block";
  overlay.style.position = "fixed";
  overlay.style.top = "0";
  overlay.style.left = "0";
  overlay.style.width = "100vw";
  overlay.style.height = "100vh";
  const W = window.innerWidth;
  const H = window.innerHeight;
  shatterCv.width  = slashCv.width  = W;
  shatterCv.height = slashCv.height = H;

  const sCtx  = shatterCv.getContext("2d");
  const slCtx = slashCv.getContext("2d");

  audio.currentTime = 0;
  audio.play().catch(() => {});

  // Phase 1: shatter (0ms) → triggers shred at completion (~1500ms)
  shatterEffect(sCtx, W, H, () => {
    shredReveal(domainBg, W, H, () => {
      domainTitle.style.transition = "opacity 1.2s ease";
      domainTitle.style.opacity = "1";
    });
  });

  // Slashes start shortly after shatter begins
  setTimeout(() => slashEffect(slCtx, W, H), 300);

  overlay.addEventListener("click", () => {
    overlay.style.display = "none";
    domainBg.style.opacity = "0";
    domainTitle.style.opacity = "0";
    audio.pause();
    audio.currentTime = 0;
    // Remove shred strips if any remain
    overlay.querySelectorAll(".shred-strip").forEach(s => s.remove());
  }, { once: true });
}

// ─────────────────────────────────────────────
// GLASS SHATTER
// ─────────────────────────────────────────────
function shatterEffect(ctx, W, H, onDone) {
  const cx = W / 2, cy = H / 2;
  const NUM = 55;
  const rng = () => Math.random();

  // Seed points
  const seeds = Array.from({ length: NUM }, () => ({
    x: rng() * W, y: rng() * H
  }));

  function d2(a, b) { return (a.x-b.x)**2 + (a.y-b.y)**2; }

  // Build triangular shards
  const shards = seeds.map(s => {
    const neighbours = seeds
      .filter(n => n !== s)
      .sort((a, b) => d2(s, a) - d2(s, b));
    const n1 = neighbours[0], n2 = neighbours[1];
    const pts = [
      { x: s.x,  y: s.y },
      { x: (s.x + n1.x) / 2, y: (s.y + n1.y) / 2 },
      { x: (s.x + n2.x) / 2, y: (s.y + n2.y) / 2 }
    ];
    const ox = (pts[0].x + pts[1].x + pts[2].x) / 3;
    const oy = (pts[0].y + pts[1].y + pts[2].y) / 3;
    return {
      pts, ox, oy, angle: 0,
      vx: (ox - cx) * 0.013 * (0.5 + rng()),
      vy: (oy - cy) * 0.013 * (0.5 + rng()),
      vr: (rng() - 0.5) * 0.09,
      alpha: 1,
      glint: rng()
    };
  });

  let flashAlpha = 1.0;
  let frame = 0;
  const TOTAL = 540; // ~9s at 60fps

  function tick() {
    ctx.clearRect(0, 0, W, H);

    // White flash
    if (flashAlpha > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
      ctx.fillRect(0, 0, W, H);
      flashAlpha = Math.max(0, flashAlpha - 0.08);
    }

    const t = frame / TOTAL;

    // Crack lines from center, grow in first 25 frames
    if (frame < 25) drawCracks(ctx, cx, cy, W, H, frame / 25, frame);

    for (const sh of shards) {
      ctx.save();
      ctx.translate(sh.ox, sh.oy);
      ctx.rotate(sh.angle);
      ctx.translate(-sh.ox, -sh.oy);

      ctx.beginPath();
      ctx.moveTo(sh.pts[0].x, sh.pts[0].y);
      ctx.lineTo(sh.pts[1].x, sh.pts[1].y);
      ctx.lineTo(sh.pts[2].x, sh.pts[2].y);
      ctx.closePath();

      ctx.fillStyle = `rgba(180,210,255,${sh.alpha * 0.15})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(255,255,255,${sh.alpha * 0.95})`;
      ctx.lineWidth = 1.2;
      ctx.stroke();

      if (sh.glint > 0.72) {
        ctx.fillStyle = `rgba(255,255,255,${sh.alpha * 0.45})`;
        ctx.fill();
      }
      ctx.restore();

      // Fly apart after 70% through animation
      if (t > 0.7) {
        sh.pts.forEach(p => { p.x += sh.vx; p.y += sh.vy; });
        sh.ox += sh.vx;
        sh.oy += sh.vy;
        sh.angle += sh.vr;
        sh.alpha -= 0.008;
      }
    }

    frame++;
    if (frame < TOTAL) {
      requestAnimationFrame(tick);
    } else {
      ctx.clearRect(0, 0, W, H);
      if (onDone) onDone();
    }
  }
  tick();
}

function drawCracks(ctx, cx, cy, W, H, progress, frame) {
  const NUM_CRACKS = 20;
  ctx.save();
  ctx.strokeStyle = `rgba(255,255,255,${0.85 * progress})`;
  ctx.lineWidth = 1.5;
  const maxLen = Math.max(W, H) * 0.7;
  for (let i = 0; i < NUM_CRACKS; i++) {
    // Use frame as seed so cracks stay stable per frame
    const seedAngle = (i / NUM_CRACKS) * Math.PI * 2;
    const angle = seedAngle + ((i * 7919) % 100) * 0.006;
    const len = (0.35 + ((i * 6271) % 100) * 0.004) * maxLen * progress;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    let x = cx, y = cy;
    const steps = 5;
    for (let s = 1; s <= steps; s++) {
      const jitter = ((i * s * 3571) % 100 - 50) * 0.004;
      const nx = cx + Math.cos(angle + jitter) * len * (s / steps);
      const ny = cy + Math.sin(angle + jitter) * len * (s / steps);
      ctx.lineTo(nx, ny);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
// SHRED REVEAL (vertical strips fly in from alternating sides)
// ─────────────────────────────────────────────
function shredReveal(bgEl, W, H, onDone) {
  const NUM = 30;
  const stripW = W / NUM;
  const overlay = document.getElementById("domain-overlay");
  const strips = [];

  // Pull the image URL directly from the bg element's computed style
  const bgImage = window.getComputedStyle(bgEl).backgroundImage;

  for (let i = 0; i < NUM; i++) {
    const div = document.createElement("div");
    div.className = "shred-strip";
    const fromTop = i % 2 === 0;
    div.style.cssText = `
      position: absolute;
      top: 0; left: ${i * stripW}px;
      width: ${Math.ceil(stripW) + 1}px;
      height: ${H}px;
      background-image: ${bgImage};
      background-size: ${W}px ${H}px;
      background-position: ${-i * stripW}px 0;
      background-repeat: no-repeat;
      transform: translateY(${fromTop ? '-110%' : '110%'});
      opacity: 0;
      will-change: transform, opacity;
    `;
    overlay.appendChild(div);
    strips.push({ el: div, delay: i * 180 + Math.random() * 120 });
  }

  strips.forEach(({ el, delay }) => {
    setTimeout(() => {
      el.style.transition = "transform 1.8s cubic-bezier(0.16,1,0.3,1), opacity 0.6s";
      el.style.transform  = "translateY(0)";
      el.style.opacity    = "1";
    }, delay);
  });

  const totalDuration = 7000;
  setTimeout(() => {
    bgEl.style.transition = "opacity 0.6s";
    bgEl.style.opacity = "1";
    strips.forEach(({ el }) => el.remove());
    if (onDone) onDone();
  }, totalDuration);
}

// ─────────────────────────────────────────────
// SLASH EFFECT (sweeping white lines)
// ─────────────────────────────────────────────
function slashEffect(ctx, W, H) {
  const slashes = [];

  function spawnSlash(forceVertical) {
    const vertical = forceVertical !== undefined ? forceVertical : Math.random() > 0.35;
    const jitter = () => (Math.random() - 0.5) * 40;
    if (vertical) {
      const x = Math.random() * W;
      slashes.push({ x1: x+jitter(), y1: -10, x2: x+jitter(), y2: H+10,
        alpha: 1, width: Math.random()*3+1.5, speed: 0.04 + Math.random()*0.02 });
    } else {
      const y = Math.random() * H;
      slashes.push({ x1: -10, y1: y+jitter(), x2: W+10, y2: y+jitter(),
        alpha: 1, width: Math.random()*2+0.8, speed: 0.03 + Math.random()*0.02 });
    }
  }

  // Wave schedule — light during shatter, heavy after image forms (~8s)
  const waves = [
    { time: 0,    count: 3, vertical: true  },
    { time: 350,  count: 4, vertical: false },
    { time: 800,  count: 5, vertical: true  },
    { time: 1300, count: 3, vertical: null  },
    { time: 2000, count: 4, vertical: null  },
    { time: 3000, count: 6, vertical: null  },
    // Heavy slash barrage after image fully forms
    { time: 8000,  count: 8,  vertical: null },
    { time: 8400,  count: 6,  vertical: true },
    { time: 8700,  count: 7,  vertical: false },
    { time: 9200,  count: 10, vertical: null },
    { time: 9800,  count: 8,  vertical: true },
    { time: 10400, count: 9,  vertical: null },
    { time: 11000, count: 12, vertical: null },
  ];

  waves.forEach(({ time, count, vertical }) => {
    for (let i = 0; i < count; i++) {
      setTimeout(() => spawnSlash(vertical === null ? undefined : vertical), time + i * 40);
    }
  });

  // Light recurring slashes during shatter phase
  let imageFormed = false;
  setTimeout(() => { imageFormed = true; }, 8000);

  // Recurring slashes — slow before image, rapid after
  const interval = setInterval(() => {
    const overlay = document.getElementById("domain-overlay");
    if (overlay.style.display === "none") { clearInterval(interval); return; }
    if (imageFormed) {
      // Heavy barrage after image appears
      const count = Math.floor(Math.random() * 3) + 3;
      for (let i = 0; i < count; i++) {
        setTimeout(() => spawnSlash(), i * 35);
      }
    } else {
      spawnSlash();
      if (Math.random() > 0.5) spawnSlash();
    }
  }, imageFormed ? 250 : 900);

  // Switch to rapid interval once image forms
  setTimeout(() => {
    clearInterval(interval);
    setInterval(() => {
      const overlay = document.getElementById("domain-overlay");
      if (overlay.style.display === "none") return;
      const count = Math.floor(Math.random() * 4) + 3;
      for (let i = 0; i < count; i++) {
        setTimeout(() => spawnSlash(), i * 30);
      }
    }, 280);
  }, 8000);

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (let i = slashes.length - 1; i >= 0; i--) {
      const sl = slashes[i];
      ctx.save();
      ctx.globalAlpha = sl.alpha;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth   = sl.width;
      ctx.shadowColor = "#ffffff";
      ctx.shadowBlur  = 12;
      ctx.beginPath();
      ctx.moveTo(sl.x1, sl.y1);
      ctx.lineTo(sl.x2, sl.y2);
      ctx.stroke();
      ctx.restore();
      sl.alpha -= sl.speed;
      if (sl.alpha <= 0) slashes.splice(i, 1);
    }
    const overlay = document.getElementById("domain-overlay");
    if (overlay.style.display !== "none") requestAnimationFrame(draw);
  }
  draw();
}

// ─────────────────────────────────────────────
// MEDIAPIPE INIT
// ─────────────────────────────────────────────
async function init() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
  );
  const handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "CPU"
    },
    numHands: 2,
    runningMode: "IMAGE"
  });

  statusEl.textContent = "Ready. Upload an image.";
  uploadEl.disabled = false;

  uploadEl.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const img = new Image();
    img.onload = async () => {
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);
      const result = handLandmarker.detect(canvas);
      const { landmarks } = result;
      statusEl.textContent = `Detected ${landmarks.length} hand(s).`;
      const drawUtils = new DrawingUtils(ctx);
      for (const lm of landmarks) {
        drawUtils.drawConnectors(lm, HandLandmarker.HAND_CONNECTIONS, { color: "#00ff88", lineWidth: 2 });
        drawUtils.drawLandmarks(lm, { color: "#ff0055", lineWidth: 1, radius: 3 });
      }
      if (landmarks.length >= 2 && checkGesture(landmarks)) {
        resultEl.textContent = "⛩️ MATCHED — Malevolent Shrine";
        resultEl.className = "matched";
        triggerDomainExpansion();
      } else {
        resultEl.textContent = "";
        resultEl.className = "";
      }
    };
    img.src = URL.createObjectURL(file);
  });
}

init().catch(err => {
  statusEl.textContent = "Error: " + err.message;
  console.error(err);
});
</script>
</body>
</html>
